[ids]
*

[main]
# Mac-like keybindings - Meta (Cmd) is mapped to Super/Windows key
# Text editing
meta+a = C-a          # Select all
meta+c = C-c          # Copy
meta+x = C-x          # Cut
meta+v = C-v          # Paste
meta+z = C-z          # Undo
meta+shift+z = C-S-z  # Redo
meta+s = C-s          # Save
meta+shift+s = C-S-s  # Save as
meta+o = C-o          # Open
meta+f = C-f          # Find
meta+g = C-g          # Find next
meta+shift+g = C-S-g  # Find previous
meta+p = C-p          # Print
meta+n = C-n          # New

# Navigation
meta+left = home              # Beginning of line
meta+right = end              # End of line
meta+up = C-home              # Beginning of document
meta+down = C-end             # End of document
meta+shift+left = S-home      # Select to beginning of line
meta+shift+right = S-end      # Select to end of line
meta+shift+up = C-S-home      # Select to beginning of document
meta+shift+down = C-S-end     # Select to end of document

# Word navigation (Alt is used as in Mac)
alt+left = C-left             # Word left
alt+right = C-right           # Word right
alt+shift+left = C-S-left     # Select word left
alt+shift+right = C-S-right   # Select word right
alt+backspace = C-backspace   # Delete word backward
alt+delete = C-delete         # Delete word forward

# Tab management
meta+t = C-t                  # New tab
meta+w = C-w                  # Close tab
meta+shift+t = C-S-t          # Reopen closed tab
meta+tab = C-tab              # Next tab
meta+shift+tab = C-S-tab      # Previous tab
meta+1 = C-1                  # Tab 1
meta+2 = C-2                  # Tab 2
meta+3 = C-3                  # Tab 3
meta+4 = C-4                  # Tab 4
meta+5 = C-5                  # Tab 5
meta+6 = C-6                  # Tab 6
meta+7 = C-7                  # Tab 7
meta+8 = C-8                  # Tab 8
meta+9 = C-9                  # Tab 9

# Browser shortcuts
meta+l = C-l                  # Focus address bar
meta+r = C-r                  # Reload
meta+shift+r = C-S-r          # Hard reload
meta+d = C-d                  # Bookmark
meta+shift+d = C-S-d          # Bookmark manager
meta+enter = C-enter          # Open in new tab
meta+shift+enter = C-S-enter  # Open in new window
meta+[ = A-left               # Back
meta+] = A-right              # Forward

# Developer shortcuts
meta+/ = C-/                  # Toggle comment
meta+shift+/ = C-S-/          # Block comment
meta+k = C-k                  # Delete line/Clear
meta+shift+k = C-S-k          # Delete line
meta+b = C-b                  # Bold
meta+i = C-i                  # Italic
meta+u = C-u                  # Underline
meta+shift+i = f12            # Developer tools
meta+shift+c = C-S-c          # Inspect element
meta+shift+j = C-S-j          # Console

# Window/Application control
meta+q = A-f4                 # Quit application
meta+m = C-m                  # Minimize
meta+h = C-h                  # History/Hide
meta+, = C-,                  # Preferences

# Zoom controls
meta+= = C-=                  # Zoom in
meta+- = C--                  # Zoom out
meta+0 = C-0                  # Reset zoom
meta++ = C-+                  # Zoom in (plus key)

# Other
meta+. = escape               # Cancel/Escape
meta+space = noop             # Disable (for fcitx5)

# Terminal-specific overrides would need to be done differently
# since keyd works at a lower level than window detection